version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bulletin-db
    restart: always
    environment:
      POSTGRES_DB: bulletindb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: bulletin-backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bulletindb
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=votre_secret_tres_long_et_securise_ici
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads

volumes:
  uploads:
