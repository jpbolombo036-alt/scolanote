spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bulletindb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: true

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:noreply@bulletin.local}

  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

server:
  port: ${SERVER_PORT:${PORT:8000}}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

  jwt:
    secret: ${JWT_SECRET:please-change-this-in-production-use-a-secure-random-key-at-least-256-bits}
    expiration: 86400000

  security:
    require-activation: true
    max-login-attempts: 5
    lockout-duration-minutes: 15
    admin-init-key: ${ADMIN_INIT_KEY:BULLETIN_INIT_2024_SECURE_KEY_CHANGE_ME}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  bulletin:
    # Seuils configurables de mention et decision (en pourcentage)
    mention:
      excellent: 85
      tres-bien: 70
      bien: 60
      satisfaction: 50
    decision:
      admis: 50
      echec: 0

  upload:
    dir: ${UPLOAD_DIR:/tmp/uploads}
    max-file-size: ${MAX_FILE_SIZE:150MB}

logging:
  level:
    com.bulletin: ${LOG_LEVEL:INFO}
